# Render Blueprint — deploys the FastAPI backend + a managed Postgres.
# In Render: New → Blueprint → pick this repo. Secrets (sync:false) are entered
# in the dashboard after the first apply.
services:
  - type: web
    name: seo-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    plan: starter        # 'free' works but spins down when idle (cold starts);
                         # 'starter' keeps report jobs reliable.
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: seo-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      # --- secrets: set these in the Render dashboard (sync:false) ---
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: AUTH_ALLOWED_DOMAIN
        value: schbang.com
      - key: ADMIN_EMAILS
        value: omkar.rakshe@schbang.com
      - key: AUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: AUTH_GOOGLE_CLIENT_SECRET
        sync: false
      - key: AUTH_REDIRECT_URI
        sync: false        # https://<your-vercel>.vercel.app/api/auth/callback
      - key: FRONTEND_ORIGIN
        sync: false        # https://<your-vercel>.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: GOOGLE_PAGESPEED_API_KEY
        sync: false
      - key: CLARITY_API_TOKEN
        sync: false
      - key: USER_OAUTH_CLIENT_ID
        sync: false
      - key: USER_OAUTH_CLIENT_SECRET
        sync: false
      - key: USER_OAUTH_REFRESH_TOKEN
        sync: false
      - key: CLIENTS_JSON
        sync: false

databases:
  - name: seo-db
    plan: free           # free Postgres is fine to start
